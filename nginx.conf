# NGINX REVERSE PROXY CONFIGURATION - CONER PRODUCTION
#
# Este archivo configura Nginx como reverse proxy para la aplicación CONER
# con soporte para HTTPS, compresión y seguridad.
#
# Ubicación: /etc/nginx/sites-available/coner
# Habilitar: sudo ln -s /etc/nginx/sites-available/coner /etc/nginx/sites-enabled/
# Validar: sudo nginx -t
# Recargar: sudo systemctl reload nginx

# ═══════════════════════════════════════════════════════════════════════════
# UPSTREAM SERVERS
# ═══════════════════════════════════════════════════════════════════════════

# Backend FastAPI
upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Frontend React
upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ═══════════════════════════════════════════════════════════════════════════
# HTTP REDIRECT TO HTTPS
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════════════════
# HTTPS SERVER
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─────────────────────────────────────────────────────────────────────
    # SSL CERTIFICATES (Let's Encrypt)
    # ─────────────────────────────────────────────────────────────────────

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ─────────────────────────────────────────────────────────────────────
    # SSL CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────

    # Protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Session optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─────────────────────────────────────────────────────────────────────
    # SECURITY HEADERS
    # ─────────────────────────────────────────────────────────────────────

    # Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;

    # X-Frame-Options
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─────────────────────────────────────────────────────────────────────
    # LOGGING
    # ─────────────────────────────────────────────────────────────────────

    access_log /var/log/nginx/coner_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/coner_error.log warn;

    # ─────────────────────────────────────────────────────────────────────
    # GZIP COMPRESSION
    # ─────────────────────────────────────────────────────────────────────

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json;
    gzip_disable "msie6";

    # ─────────────────────────────────────────────────────────────────────
    # RATE LIMITING
    # ─────────────────────────────────────────────────────────────────────

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # ─────────────────────────────────────────────────────────────────────
    # API ROUTES - /api/*
    # ─────────────────────────────────────────────────────────────────────

    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy settings
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Keep-alive
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Redirects
        proxy_redirect off;

        # Cache
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ─────────────────────────────────────────────────────────────────────
    # STATIC FILES - /docs, /openapi.json (Backend Static)
    # ─────────────────────────────────────────────────────────────────────

    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache docs
        add_header Cache-Control "public, max-age=3600";
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;

        # Cache
        add_header Cache-Control "public, max-age=3600";
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─────────────────────────────────────────────────────────────────────
    # FRONTEND ROUTES - /
    # ─────────────────────────────────────────────────────────────────────

    location / {
        # Rate limiting
        limit_req zone=general_limit burst=50 nodelay;

        # Proxy to frontend
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive
        proxy_set_header Connection "";

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;

        # Cache policy
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ─────────────────────────────────────────────────────────────────────
    # HEALTH CHECK ENDPOINT
    # ─────────────────────────────────────────────────────────────────────

    location /health {
        access_log off;
        proxy_pass http://backend/api/health;
        proxy_http_version 1.1;
    }

    # ─────────────────────────────────────────────────────────────────────
    # DENY ACCESS TO SENSITIVE FILES
    # ─────────────────────────────────────────────────────────────────────

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─────────────────────────────────────────────────────────────────────
    # DEFAULT ERROR PAGES
    # ─────────────────────────────────────────────────────────────────────

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ═══════════════════════════════════════════════════════════════════════════
# INSTALLATION INSTRUCTIONS
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. Edit this file and replace:
#    - yourdomain.com with your actual domain
#    - Certificate paths if using different provider
#
# 2. Copy to Nginx:
#    sudo cp nginx.conf /etc/nginx/sites-available/coner
#
# 3. Enable site:
#    sudo ln -s /etc/nginx/sites-available/coner /etc/nginx/sites-enabled/
#
# 4. Test configuration:
#    sudo nginx -t
#
# 5. Reload Nginx:
#    sudo systemctl reload nginx
#
# 6. Verify:
#    curl -I https://yourdomain.com
#    curl -I https://yourdomain.com/api/health
#
# ═══════════════════════════════════════════════════════════════════════════
